# This workflow is called from:
# o) build workflows, eg cyberdojo/saver/.github/workflows/main.yml.
# o) deployment workflows, from the cyberdojo/aws-prod-co-promotion repo
# o) this repos workflow to scan aws-beta and aws-prod Environments
#
# Relies on the caller's context having:
# ${{env.KOSLI_ORG}}
# ${{env.KOSLI_HOST}}

name: Artifact Snyk Test

on:
  workflow_call:
    outputs:
      vulns_json:
        description: "JSON array of vuln objects for the artifact"
        value: ${{jobs.attest-snyk-vulns.outputs.vulns}}

    secrets:
      snyk_token:
        required: true
      kosli_api_token:
        required: true

    inputs:
      aws_rolename:
        description: "Rolename for permission to download artifact"
        required: false
        type: string
        default: "gh_actions_snyk_scanning"
      artifact_name:
        description: "Artifact name"
        required: true
        type: string
      kosli_flow:
        description: "The Kosli flow to attest to"
        required: true
        type: string
      kosli_trail:
        description: "The Kosli trail to attest to"
        required: true
        type: string
      kosli_attestation_name:
        description: "The Kosli attestation slot to attest to"
        required: true
        type: string
      repo_name:
        description: "Artifact repo"
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      snyk_version:
        description: "Version of snyk to run"
        required: false
        type: string
        default: "v1.1300.2"
      raw_snyk_policy_url:
        description: "URL of snyk policy file (in commit for artifact)"
        required: false
        type: string
        default: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/.snyk
      attest_to_kosli:
        description: "Whether to make attestations for each vuln"
        required: false
        type: boolean
        default: ${{ github.ref == 'refs/heads/main' }}

env:
  KOSLI_DEBUG:     ${{vars.KOSLI_DEBUG}}   # false
  KOSLI_DRY_RUN:   ${{vars.KOSLI_DRY_RUN}} # false
  KOSLI_HOST:      ${{vars.KOSLI_HOST}}    # https://app.kosli.com
  KOSLI_ORG:       ${{vars.KOSLI_ORG}}     # cyber-dojo
  KOSLI_FLOW:      ${{inputs.kosli_flow}}
  KOSLI_TRAIL:     ${{inputs.kosli_trail}}
  KOSLI_API_TOKEN:        ${{secrets.kosli_api_token}}
  REGO_POLICY_FILENAME:   snyk-vuln-compliance.rego
  REGO_POLICY_URL:        https://raw.githubusercontent.com/cyber-dojo/snyk-scanning/main/snyk-vuln-compliance.rego

jobs:
  create-snyk-cat:
    runs-on: ubuntu-latest
    outputs:
      name: ${{steps.create.outputs.name}}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: cyber-dojo/snyk-scanning
          ref: main
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Create custom-attestation-type
        id: create
        run: |
          name=single-snyk-vuln
          kosli create attestation-type \
            ${name} \
            --schema single-snyk-vuln.schema.json \
            --jq 'true'
          echo "name=${name}" >> ${GITHUB_OUTPUT}


  find-snyk-vulns:
    runs-on: ubuntu-latest
    needs: [create-snyk-cat]
    outputs:
      fingerprint: ${{steps.set-fingerprint.outputs.fingerprint}}
      vulns: ${{steps.set-vulns.outputs.vulns}}
    permissions:
      id-token: write
      contents: write
    env:
      SNYK_SARIF_FILENAME: snyk.container.test.json
      SNYK_POLICY_FILENAME: .snyk
      VULN_FILENAME: vulns.json
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: cyber-dojo/snyk-scanning
          ref: main
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::244531986313:role/${{inputs.aws_rolename}}
          aws-region: eu-central-1
          role-duration-seconds: 2400
          role-session-name: ${{github.event.repository.name}}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Set output fingerprint
        id: set-fingerprint
        run: |
          FINGERPRINT="$(kosli fingerprint ${{inputs.artifact_name}} \
            --artifact-type=oci \
            --debug=false
          )"
          echo "fingerprint=${FINGERPRINT}" >> ${GITHUB_OUTPUT}

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        with:
          snyk-version: ${{inputs.snyk_version}}

      - name: Fail if the sarif file already exists
        run: |
          if test -f ${SNYK_SARIF_FILENAME} ; then
            echo "ERROR: ${SNYK_SARIF_FILENAME} already exists"
            exit 42
          fi

      - name: Set empty .snyk policy file
        run:
          echo > ${SNYK_POLICY_FILENAME}

      - name: Run Snyk container test
        env:
          SNYK_TOKEN: ${{secrets.snyk_token}}
        run:
          snyk container test ${{inputs.artifact_name}}
            --policy-path=${SNYK_POLICY_FILENAME}
            --sarif
            --sarif-file-output=${SNYK_SARIF_FILENAME} || true

      - name: Fail if the sarif file is not created
        run: |
          # Guard against 0 exit code but no sarif file created!
          if ! test -f ${SNYK_SARIF_FILENAME} ; then
            echo "ERROR: ${SNYK_SARIF_FILENAME} was not created"
            exit 43
          fi

      - name: Get the real .snyk file
        run: |
          URL="${{inputs.raw_snyk_policy_url}}"
          curl --fail-with-body "${URL}" > "${SNYK_POLICY_FILENAME}"

      - name: Debug print policy file
        if: env.KOSLI_DEBUG == 'true'
        run:
          cat "${SNYK_POLICY_FILENAME}"

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Combine all data ready for evaluation
        run: |
          ./bin/combine_snyk.py \
            ${{inputs.snyk_version}} \
            ${{inputs.repo_name}} \
            ${SNYK_SARIF_FILENAME} \
            ${SNYK_POLICY_FILENAME} \
              > ${VULN_FILENAME}

      - name: Debug print vulns
        run:
          jq . "${VULN_FILENAME}"

      - name: Set output vulns
        id: set-vulns
        run: |
          VULNS="$(jq --compact-output . ${VULN_FILENAME})"
          echo "vulns=${VULNS}" >> ${GITHUB_OUTPUT}


  attest-individual-snyk-vulns:
    needs: [create-snyk-cat, find-snyk-vulns]
    if: needs.find-snyk-vulns.outputs.vulns != '[]'
    runs-on: ubuntu-latest
    env:
      VULN_JSON: ${{toJSON(matrix)}}
      VULN_FILENAME: vuln-${{matrix.trail_name}}.json
      KOSLI_FLOW: snyk-vulns
      KOSLI_TRAIL: ${{matrix.trail_name}}
    strategy:
      matrix:
        include: ${{fromJSON(needs.find-snyk-vulns.outputs.vulns)}}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Add time vuln first seen in the repo
        run: |
          kosli create flow ${KOSLI_FLOW} --use-empty-template
          kosli begin trail ${KOSLI_TRAIL} # idempotent
          kosli get trail ${KOSLI_TRAIL} --output json > trail.json
          FIRST_SEEN_TS="$(jq '.created_at' trail.json)"
          FIRST_SEEN="$(python3 -c "from datetime import datetime, timezone; print(str(datetime.fromtimestamp(${FIRST_SEEN_TS}, tz=timezone.utc)))")"

          jq --argjson val "${FIRST_SEEN_TS}" \
            '. + {"first_seen_ts": $val}' \
            <<< "${VULN_JSON}" > ${VULN_FILENAME}

          jq --arg val "${FIRST_SEEN}" \
            '. + {"first_seen": $val}' \
            ${VULN_FILENAME} > tmp.json && mv tmp.json ${VULN_FILENAME}

      - name: Debug print one vuln
        if: env.KOSLI_DEBUG == 'true'
        run:
          jq . ${VULN_FILENAME}

      - name: Make snyk-vuln data attestation to Kosli
        run:
          kosli attest custom
            --annotate snyk_URL=${{matrix.vuln_url}}
            --attestation-data ${VULN_FILENAME}
            --name snyk
            --type ${{needs.create-snyk-cat.outputs.name}}

      - name: Evaluate trail and add to vuln data
        run: |
          curl --fail-with-body "${REGO_POLICY_URL}" > ${REGO_POLICY_FILENAME}

          EVALUATION="$(kosli evaluate trail ${KOSLI_TRAIL} \
            --flow ${KOSLI_FLOW} \
            --policy="${REGO_POLICY_FILENAME}" \
            --output=json)"

          jq --argjson eval "${EVALUATION}" \
            '. + {"evaluation": $eval}' \
            ${VULN_FILENAME} > tmp.json && mv tmp.json ${VULN_FILENAME}

      - name: Get attestation URL ready for --annotate
        run: |
          ATTESTATION_URL="$(kosli get attestation snyk \
            --flow ${KOSLI_FLOW} \
            --trail ${KOSLI_TRAIL} \
            --output json \
            | jq -r 'last | .html_url')"

          jq --arg url "${ATTESTATION_URL}" \
            '. + {"attestation_url": $url}' \
            ${VULN_FILENAME} > tmp.json && mv tmp.json ${VULN_FILENAME}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{env.VULN_FILENAME}}
          path: ${{env.VULN_FILENAME}}


  attest-snyk-vulns:
    needs: [find-snyk-vulns, attest-individual-snyk-vulns]
    if: always() && inputs.attest_to_kosli && needs.find-snyk-vulns.result == 'success'
    outputs:
      vulns: ${{steps.set-vulns.outputs.vulns}}
    runs-on: ubuntu-latest
    env:
      VULNS_FILENAME: vulns.json
      KOSLI_FINGERPRINT: ${{needs.find-snyk-vulns.outputs.fingerprint}}
      KOSLI_ATTESTATION_NAME: ${{inputs.kosli_attestation_name}}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          pattern: vuln-*.json
          merge-multiple: true

      - name: Set vuln output
        id: set-vulns
        run: |
          if [ "${{needs.attest-individual-snyk-vulns.result}}" = "skipped" ]; then
            VULNS=[]
          else
            VULNS="$(jq --compact-output --slurp . vuln-*.json)"
          fi
          echo "${VULNS}" > "${VULNS_FILENAME}"
          echo "vulns=${VULNS}" >> ${GITHUB_OUTPUT}

      - name: Debug print vulns
        if: env.KOSLI_DEBUG == 'true'
        run:
          jq . ${VULNS_FILENAME}

      - name: Get the rego policy file
        run: |
          curl --fail-with-body "${REGO_POLICY_URL}" > ${REGO_POLICY_FILENAME}

      - name: Attest NO vulns
        if: needs.attest-individual-snyk-vulns.result == 'skipped'
        run:
          kosli attest generic
            --compliant=true
            --attachments="${REG_POLICY_FILENAME}"
            --name="${KOSLI_ATTESTATION_NAME}"

      - name: Attest SOME vulns
        if: needs.attest-individual-snyk-vulns.result != 'skipped'
        run: |
          # TODO: Should COMPLIANT=false fail the job?
          COMPLIANT="$(jq 'map(.evaluation.allow) | all' "${VULNS_FILENAME}")"

          ANNOTATE_FLAGS=()
          i=0
          while IFS=$'\t' read -r allow url; do
            if [ "${allow}" = "true" ]; then status=pass; else status=fail; fi
            printf -v key "vuln_url_%s_%03d" "${status}" "${i}"
            ANNOTATE_FLAGS+=(--annotate "${key}=${url}")
            i=$((i+1))
          done < <(jq -r '.[] | [(.evaluation.allow | tostring), .attestation_url] | @tsv' "${VULNS_FILENAME}")

          kosli attest generic \
            --compliant="${COMPLIANT}" \
            --attachments="${REGO_POLICY_FILENAME}" \
            --name="${KOSLI_ATTESTATION_NAME}" \
            "${ANNOTATE_FLAGS[@]}"

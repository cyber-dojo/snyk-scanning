name: Check Expiry and Notify

on:
  workflow_call:
    inputs:
      kosli_env:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

env:
  GITHUB_RUN_URL:       https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
  RESPONSE_GUIDE_URL:   https://github.com/${{github.repository}}/blob/main/docs/expiry-response.md

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download vuln files from this run
        uses: actions/download-artifact@v8
        with:
          pattern: vuln-*.json
          merge-multiple: true
          path: vulns

      - name: Find vulns
        run: |
          RESULT=$(./bin/find_expiring_vulns.py \
            --env ${{ inputs.kosli_env }} \
            --vuln-dir vulns)
          STATUS_SYMBOL=$(echo "${RESULT}" | jq --raw-output '
            if ((.vulns | length) > 0) and (.vulns[0].days_remaining <= 0)
            then ":x:"
            else ":white_check_mark:"
            end')
          {
            echo "VULNS_JSON<<EOF"
            echo "${RESULT}" | jq --compact-output '.vulns'
            echo "EOF"
            echo "STATUS_SYMBOL=${STATUS_SYMBOL}"
            echo "SLACK_MESSAGE<<EOF"
            echo "${RESULT}" | jq --raw-output '
              if (.vulns | length) == 0
              then "No Snyk vulnerabilities :-)"
              else
                .vulns[0]                         as $v         |
                ($v.days_remaining | ceil)        as $d         |
                "Vuln: \($v.full_id)"             as $vuln      |
                "Severity: \($v.severity)"        as $severity  |
                "Repo: \($v.artifact)"            as $repo      |
                (if $d > 0
                 then "Days till non-compliant: \($d)"
                 else "Days non-compliant: \(0 - $d)"
                 end)                             as $days_line |
                "Mechanism: \($v.mechanism)"      as $mechanism |
                "\($vuln)\n\($severity)\n\($repo)\n\($days_line)\n\($mechanism)"
              end'
            echo "EOF"
          } >> ${GITHUB_ENV}

      - name: Send Slack
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "Environment: ${{ inputs.kosli_env }} ${STATUS_SYMBOL}\n${SLACK_MESSAGE}\nSee: ${GITHUB_RUN_URL}\nResponse guide: ${RESPONSE_GUIDE_URL}"

      - name: Send Slack -- workflow failure
        if: failure()
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "Snyk: check-expiry-and-notify workflow FAILED.\nSee ${GITHUB_RUN_URL}"

      - name: Write GitHub step summary
        run: |
          ./bin/print_expiring_vulns_summary.py \
            --env   "${{ inputs.kosli_env }}" \
            --vulns "${VULNS_JSON}" \
            >> "${GITHUB_STEP_SUMMARY}"

name: Live Snyk Test

on:
  workflow_call:
    secrets:
      snyk_token:
        required: true
      kosli_api_token:
        required: true
    inputs:
      kosli_env:
        description: "The Kosli Environment to live snyk test"
        required: true
        type: string
      kosli_flow_name_all_vulns:
        description: "Name of Kosli Flow to attest all vulns in Environment"
        required: true
        type: string
      kosli_trail_name_all_vulns:
        description: "Name of Kosli Trail to attest all vulns in Environment"
        required: true
        type: string
      kosli_flow_name_new_vulns:
        description: "Name of Kosli Flow to attest new vulns in Environment"
        required: true
        type: string

env:
  KOSLI_DEBUG:   ${{ vars.KOSLI_DEBUG }}   # true/false
  KOSLI_DRY_RUN: ${{ vars.KOSLI_DRY_RUN }} # true/false
  KOSLI_HOST:    ${{ vars.KOSLI_HOST }}    # https://app.kosli.com
  KOSLI_ORG:     ${{ vars.KOSLI_ORG }}     # cyber-dojo

jobs:
  setup:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create single-snyk-vulnerability custom attestation type
        env:
          KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
        run:
          kosli create attestation-type single-snyk-vuln
            --schema=single-snyk-vuln.schema.json
            --jq '.snyk_full_id == "none"'


  env-snyk-scan:
    needs: [setup]
    uses: ./.github/workflows/snyk_env_test.yml
    with:
      kosli_env:                  ${{ inputs.kosli_env }}
      kosli_flow_name_all_vulns:  ${{ inputs.kosli_flow_name_all_vulns }}      
      kosli_trail_name_all_vulns: ${{ inputs.kosli_trail_name_all_vulns }}
    secrets :
      snyk_token:      ${{ secrets.SNYK_TOKEN }}
      kosli_api_token: ${{ secrets.KOSLI_API_TOKEN }}


  env-trail-names:
    needs: [env-snyk-scan]
    runs-on: ubuntu-latest
    outputs:
      current_trail_name:  ${{ steps.set-trail-names.outputs.current_trail_name }}
      previous_trail_name: ${{ steps.set-trail-names.outputs.previous_trail_name }}
    env:
      JSON_FILENAME: trail.json
    steps:
      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Find most recent Trails in Flow aws-beta-all-snyk-vulns
        env:
          KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
          KOSLI_FLOW:      ${{ inputs.kosli_flow_name_all_vulns }}
        run: |
          # NOTE: On the first run, .data[1].name will be null, which is not
          # the name of a trail, so dependent jobs will fail, which is ok
          kosli list trails --output=json > ${JSON_FILENAME}

      - name: Set trail name outputs
        id: set-trail-names
        run: |
          current_trail_name="$(jq --raw-output '.data[0].name' ${JSON_FILENAME})"
          previous_trail_name="$(jq --raw-output '.data[1].name' ${JSON_FILENAME})"
          echo current_trail_name="${current_trail_name}"  >> ${GITHUB_OUTPUT}
          echo previous_trail_name="${previous_trail_name}" >> ${GITHUB_OUTPUT}


  env-find-new-snyk-vulns:
    needs: [env-trail-names]
    runs-on: ubuntu-latest
    outputs:
      new_vulns: ${{ steps.set-new-vulns.outputs.new_vulns }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Find new vulns by comparing previous_trail and current_trail
        id: set-new-vulns
        env:
          KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
          KOSLI_FLOW:      ${{ inputs.kosli_flow_name_all_vulns }}
          PREVIOUS_TRAIL_NAME: ${{ needs.env-trail-names.outputs.previous_trail_name }}
          CURRENT_TRAIL_NAME:  ${{ needs.env-trail-names.outputs.current_trail_name }}
          PREVIOUS_VULNS_FILENAME: previous_vulns.json
          CURRENT_VULNS_FILENAME:  current_vulns.json
          NEW_VULNS_FILENAME: new_vulns.json
        run: |
          KOSLI_TRAIL="${PREVIOUS_TRAIL_NAME}" make get_vulns | jq . > ${PREVIOUS_VULNS_FILENAME}
          KOSLI_TRAIL="${CURRENT_TRAIL_NAME}"  make get_vulns | jq . > ${CURRENT_VULNS_FILENAME}

          ./bin/get_new_vulns.py \
            ${PREVIOUS_VULNS_FILENAME} \
            ${CURRENT_VULNS_FILENAME} \
            > ${NEW_VULNS_FILENAME}

          new_vulns="$(jq --compact-output . ${NEW_VULNS_FILENAME})"
          jq . <<< "${new_vulns}"
          echo "new_vulns=${new_vulns}" >> ${GITHUB_OUTPUT}


  env-attest-new-snyk-vulns:
    needs: [env-find-new-snyk-vulns]
    if: ${{ needs.env-find-new-snyk-vulns.outputs.new_vulns != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.env-find-new-snyk-vulns.outputs.new_vulns) }}
    env:
      ATTESTATION_DATA_JSON: ${{ toJSON(matrix) }}
      ATTESTATION_DATA_FILENAME: new-snyk-vuln.json
      KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
      KOSLI_FLOW:      ${{ inputs.kosli_flow_name_new_vulns }}
      KOSLI_TRAIL:     ${{ matrix.repo_name }}-${{ matrix.artifact_fingerprint }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Save matrix JSON to file
        run:
          echo "${ATTESTATION_DATA_JSON}" > "${ATTESTATION_DATA_FILENAME}"

      - name: Attest artifact
        run:
          kosli attest artifact "${{ matrix.artifact_name }}"
            --fingerprint "${{ matrix.artifact_fingerprint }}"
            --name "${{ matrix.repo_name }}"

      - name: Attest new vuln
        if: ${{ matrix.snyk_short_id != 'none' }}
        run:
          kosli attest custom "${{ matrix.artifact_name }}"
            --fingerprint "${{ matrix.artifact_fingerprint }}"
            --type single-snyk-vuln
            --attestation-data ${ATTESTATION_DATA_FILENAME}
            --name "${{ matrix.repo_name }}.${{ matrix.snyk_severity }}-${{ matrix.snyk_short_id }}"

      - name: Attest no new vuln
        if: ${{ matrix.snyk_short_id == 'none' }}
        run:
          kosli attest custom "${{ matrix.artifact_name }}"
            --fingerprint "${{ matrix.artifact_fingerprint }}"
            --type single-snyk-vuln
            --attestation-data ${ATTESTATION_DATA_FILENAME}
            --name "${{ matrix.repo_name }}.none"

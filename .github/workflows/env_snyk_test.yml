name: Environment Snyk Test

on:
  workflow_call:
    secrets:
      snyk_token:
        required: true
      kosli_api_token:
        required: true

    inputs:
      kosli_env:
        description: "Name of Kosli environment to find artifact running in"
        required: true
        type: string
      kosli_flow:
        description: "Name of Kosli flow to attest evidence in"
        required: true
        type: string
      kosli_cat:
        description: "Name of custom attestion type"
        required: true
        type: string

jobs:

  setup:
    runs-on: ubuntu-latest
    env:
      KOSLI_API_TOKEN: ${{secrets.kosli_api_token}}
      KOSLI_DEBUG:     ${{vars.KOSLI_DEBUG}}          # true/false
      KOSLI_DRY_RUN:   ${{vars.KOSLI_DRY_RUN}}        # true/false
      KOSLI_HOST:      ${{vars.KOSLI_HOST}}           # https://app.kosli.com
      KOSLI_ORG:       ${{vars.KOSLI_ORG}}            # cyber-dojo
    steps:
      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Create Kosli flow
        run:
          kosli create flow ${{inputs.kosli_flow}}
            --description "Holds snyk vulnerabilityfor Artifacts destined for, or running in, the '${{inputs.kosli_env}}' Environment"
            --use-empty-template


  find-artifacts:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{steps.set-artifacts.outputs.artifacts}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Generate JSON for each Artifact in KOSLI_ENV for following job's strategy:matrix:include
        id: set-artifacts
        run: |
          artifacts="$(make artifacts | jq --raw-output --compact-output .)"
          jq . <<< "${artifacts}"
          echo "artifacts=${artifacts}" >> ${GITHUB_OUTPUT}

      # - name: Generate JSON for each Artifact in KOSLI_ENV for following job's strategy:matrix:include
      #   id: set-artifacts
      #   run: |
      #     # FAKE getting snapshot from kosli_env so we only do 1 snyk-container-test
      #     artifacts="$(jq --compact-output . ./fake-data/artifacts-${{inputs.kosli_env}}.json)"
      #     echo "artifacts=${artifacts}" >> ${GITHUB_OUTPUT}          


  artifact-snyk-test:
    needs: find-artifacts
    strategy:
      matrix:
        include: ${{fromJSON(needs.find-artifacts.outputs.artifacts)}}
    uses: ./.github/workflows/artifact_snyk_test.yml
    with:
      artifact_name:        ${{matrix.artifact_name}}
      artifact_fingerprint: ${{matrix.artifact_fingerprint}}
      repo_name:            ${{matrix.repo_name}}
      git_commit:           ${{matrix.git_commit}}
      commit_url:           ${{matrix.commit_url}}
      raw_snyk_policy_url:  ${{matrix.raw_snyk_policy_url}}
      kosli_env:            ${{inputs.kosli_env}}
      kosli_flow:           ${{inputs.kosli_flow}}
      kosli_cat:            ${{inputs.kosli_cat}}
    secrets:
      snyk_token:      ${{secrets.snyk_token}}
      kosli_api_token: ${{secrets.kosli_api_token}}

# Debug workflow to work on 2nd half of artifact_snyk_test.yml 
# when there are vulns 

name: Artifact Snyk Test on runner

on:
  push:
  #workflow_call:

jobs:
  call-with-runner:
    uses: ./.github/workflows/artifact_snyk_test.yml
    with:
      # In the CLI docker references with both a tag and a digest are not supported
      artifact_name: 244531986313.dkr.ecr.eu-central-1.amazonaws.com/runner:0d6ddbb
      raw_snyk_policy_url: https://raw.githubusercontent.com/cyber-dojo/runner/0d6ddbb6c6bda393738bde557d2bdb85732e6bfa/.snyk
      repo_name: runner
      kosli_flow: runner-ci
      kosli_trail: 0d6ddbb6c6bda393738bde557d2bdb85732e6bfa
      kosli_attestation_name: runner.new-snyk-container-scan
    secrets:
      snyk_token:      ${{secrets.SNYK_TOKEN}}
      kosli_api_token: ${{secrets.KOSLI_API_TOKEN}}

  print-vulns:
    needs: [call-with-runner]
    runs-on: ubuntu-latest
    env:
      VULNS_JSON: ${{needs.call-with-runner.outputs.vulns_json}}
    steps:
      - name: Print json
        run:
          jq . <<< "${VULNS_JSON}"

# Debug workflow to work on 2nd half of artifact_snyk_test.yml 
# when there are no vulns 

name: Artifact Snyk Test on saver

on:
  push:

jobs:
  call-with-saver:
    uses: ./.github/workflows/artifact_snyk_test.yml
    with:
      artifact_name: 
      raw_snyk_policy_url: https://raw.githubusercontent.com/cyber-dojo/saver/...
      repo_name: runner
      kosli_flow: scratch-debug-saver 
    secrets:
      snyk_token:      ${{secrets.SNYK_TOKEN}}
      kosli_api_token: ${{secrets.KOSLI_API_TOKEN}}

  print-vulns:
    needs: [call-with-saver]
    runs-on: ubuntu-latest
    env:
      VULNS_JSON: ${{needs.call-with-runner.outputs.vulns_json}}
    steps:
      - name: Print json
        run:
          jq . <<< "${VULNS_JSON}"
